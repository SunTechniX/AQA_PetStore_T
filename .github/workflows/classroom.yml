# .github/workflows/classroom.yml
# GitHub Classroom Autograder для Restful-Booker API

name: 🎓 Restful-Booker API - Autograder

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Структура проекта (10 баллов)
  # ─────────────────────────────────────────────────────────────
  check-structure:
    name: "📁 Структура (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      score: ${{ steps.check.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Проверка
        id: check
        run: |
          mkdir -p tools/output
          python tools/check_structure.py > tools/output/structure_result.txt 2>&1
          if grep -q "PASS" tools/output/structure_result.txt; then
            echo "score=10" >> $GITHUB_OUTPUT
            echo "10" > tools/output/structure_score.txt
          else
            echo "score=0" >> $GITHUB_OUTPUT
            echo "0" > tools/output/structure_score.txt
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Линтинг flake8 (15 баллов)
  # ─────────────────────────────────────────────────────────────
  lint-code:
    name: "🧹 Линтинг (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.lint.outputs.score }}
      error_count: ${{ steps.lint.outputs.error_count }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Запуск flake8
        id: lint
        run: |
          mkdir -p tools/output
          python -m flake8 . --config=tools/flake8_config.cfg --output-file=tools/output/flake8_report.txt --show-source --statistics 2>&1 || true
          error_count=$(grep -c ":" tools/output/flake8_report.txt 2>/dev/null || echo "0")
          score=$((15 - error_count))
          [ $score -lt 0 ] && score=0
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "error_count=$error_count" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/lint_score.txt
          echo "$error_count" > tools/output/lint_error_count.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Тесты авторизации (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-auth:
    name: "🔐 Auth API (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_auth.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/auth_results.json 2>&1 | tee tools/output/auth_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/auth_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/auth_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 15 ] && score=15
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/auth_score.txt
          echo "$passed" > tools/output/auth_passed.txt
          echo "$total" > tools/output/auth_total.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Тесты GET Booking (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-get:
    name: "📋 GET Booking (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_get_booking.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/get_results.json 2>&1 | tee tools/output/get_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/get_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/get_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 15 ] && score=15
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/get_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Тесты CREATE Booking (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-create:
    name: "➕ CREATE Booking (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_create_booking.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/create_results.json 2>&1 | tee tools/output/create_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/create_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/create_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 15 ] && score=15
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/create_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 6: Тесты UPDATE Booking (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-update:
    name: "✏️ UPDATE Booking (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_update_booking.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/update_results.json 2>&1 | tee tools/output/update_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/update_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/update_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 15 ] && score=15
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/update_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 7: Тесты DELETE Booking (10 баллов)
  # ─────────────────────────────────────────────────────────────
  test-delete:
    name: "🗑️ DELETE Booking (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_delete_booking.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/delete_results.json 2>&1 | tee tools/output/delete_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/delete_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/delete_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/delete_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 8: Тесты валидации (10 баллов)
  # ─────────────────────────────────────────────────────────────
  test-validation:
    name: "✅ Validation (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_validation.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/validation_results.json 2>&1 | tee tools/output/validation_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/validation_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/validation_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 2))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/validation_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 9: E2E тесты (25 баллов)
  # ─────────────────────────────────────────────────────────────
  test-e2e:
    name: "🔄 E2E Tests (25 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, test-auth, test-create]
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск E2E тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_e2e.py -v --tb=short --timeout=120 --json-report --json-report-file=tools/output/e2e_results.json 2>&1 | tee tools/output/e2e_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/e2e_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/e2e_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          score=$((passed * 25))
          [ $score -gt 25 ] && score=25
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/e2e_score.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 10: Итоговый отчёт
  # ─────────────────────────────────────────────────────────────
  final-summary:
    name: "📊 Итоговый отчёт"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, lint-code, test-auth, test-get, test-create, test-update, test-delete, test-validation, test-e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Генерация итоговой таблицы
        run: |
          echo "# 🏆 ИТОГОВАЯ ОЦЕНКА" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 💯 Баллы | **${{ needs.check-structure.outputs.score || 0 }} + ${{ needs.lint-code.outputs.score || 0 }} + ${{ needs.test-auth.outputs.score || 0 }} + ${{ needs.test-get.outputs.score || 0 }} + ${{ needs.test-create.outputs.score || 0 }} + ${{ needs.test-update.outputs.score || 0 }} + ${{ needs.test-delete.outputs.score || 0 }} + ${{ needs.test-validation.outputs.score || 0 }} + ${{ needs.test-e2e.outputs.score || 0 }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Тестов пройдено | **${{ needs.test-auth.outputs.passed || 0 }} + ${{ needs.test-get.outputs.passed || 0 }} + ${{ needs.test-create.outputs.passed || 0 }} + ${{ needs.test-update.outputs.passed || 0 }} + ${{ needs.test-delete.outputs.passed || 0 }} + ${{ needs.test-validation.outputs.passed || 0 }} + ${{ needs.test-e2e.outputs.passed || 0 }}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Детализация по категориям" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Категория | Тесты | Баллы |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Структура | — | ${{ needs.check-structure.outputs.score || 0 }} / 10 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Линтинг | ${{ needs.lint-code.outputs.error_count || 0 }} ошибок | ${{ needs.lint-code.outputs.score || 0 }} / 15 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Auth API | ${{ needs.test-auth.outputs.passed || 0 }} / ${{ needs.test-auth.outputs.total || 0 }} | ${{ needs.test-auth.outputs.score || 0 }} / 15 |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 GET Booking | ${{ needs.test-get.outputs.passed || 0 }} / ${{ needs.test-get.outputs.total || 0 }} | ${{ needs.test-get.outputs.score || 0 }} / 15 |" >> $GITHUB_STEP_SUMMARY
          echo "| ➕ CREATE Booking | ${{ needs.test-create.outputs.passed || 0 }} / ${{ needs.test-create.outputs.total || 0 }} | ${{ needs.test-create.outputs.score || 0 }} / 15 |" >> $GITHUB_STEP_SUMMARY
          echo "| ✏️ UPDATE Booking | ${{ needs.test-update.outputs.passed || 0 }} / ${{ needs.test-update.outputs.total || 0 }} | ${{ needs.test-update.outputs.score || 0 }} / 15 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗑️ DELETE Booking | ${{ needs.test-delete.outputs.passed || 0 }} / ${{ needs.test-delete.outputs.total || 0 }} | ${{ needs.test-delete.outputs.score || 0 }} / 10 |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Validation | ${{ needs.test-validation.outputs.passed || 0 }} / ${{ needs.test-validation.outputs.total || 0 }} | ${{ needs.test-validation.outputs.score || 0 }} / 10 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 E2E Tests | ${{ needs.test-e2e.outputs.passed || 0 }} / ${{ needs.test-e2e.outputs.total || 0 }} | ${{ needs.test-e2e.outputs.score || 0 }} / 25 |" >> $GITHUB_STEP_SUMMARY
      - name: Upload артефактов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booker-artifacts-${{ github.run_number }}
          path: |
            tools/output/
            allure-results/
            logs/
          retention-days: 7