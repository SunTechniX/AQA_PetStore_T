# .github/workflows/classroom.yml
# GitHub Classroom Autograder для PetStore API — ПОЛНАЯ ВЕРСИЯ

name: 🎓 PetStore API - Autograder

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Структура проекта (10 баллов)
  # ─────────────────────────────────────────────────────────────
  check-structure:
    name: "📁 Структура (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      score: ${{ steps.check.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Проверка
        id: check
        run: |
          mkdir -p tools/output
          python tools/check_structure.py > tools/output/structure_result.txt 2>&1
          if grep -q "PASS" tools/output/structure_result.txt; then
            echo "score=10" >> $GITHUB_OUTPUT
            echo "10" > tools/output/structure_score.txt
          else
            echo "score=0" >> $GITHUB_OUTPUT
            echo "0" > tools/output/structure_score.txt
          fi
      - name: Summary
        run: python tools/write_summary_structure.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Линтинг flake8 (15 баллов)
  # ─────────────────────────────────────────────────────────────
  lint-code:
    name: "🧹 Линтинг (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.lint.outputs.score }}
      error_count: ${{ steps.lint.outputs.error_count }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Запуск flake8
        id: lint
        run: |
          mkdir -p tools/output
          python -m flake8 . --config=tools/flake8_config.cfg --output-file=tools/output/flake8_report.txt --show-source --statistics 2>&1 || true
          error_count=$(grep -c ":" tools/output/flake8_report.txt 2>/dev/null || echo "0")
          score=$((15 - error_count))
          [ $score -lt 0 ] && score=0
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "error_count=$error_count" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/lint_score.txt
          echo "$error_count" > tools/output/lint_error_count.txt
      - name: Вывод в Summary
        run: python tools/write_summary_lint.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Тесты User API (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-user:
    name: "👤 User API (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_user.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/user_results.json 2>&1 | tee tools/output/user_output.txt || true
          
          passed=$(python -c "import json; print(json.load(open('tools/output/user_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/user_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          
          # 15 баллов за 10 тестов: 1.5 балла за тест
          score=$(python -c "print(int(min(15, $passed * 1.5)))")
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/user_score.txt
          echo "$passed" > tools/output/user_passed.txt
          echo "$total" > tools/output/user_total.txt
      - name: Вывод в Summary
        run: |
          passed=${{ steps.test.outputs.passed }}
          total=${{ steps.test.outputs.total }}
          score=${{ steps.test.outputs.score }}
          echo "## 👤 User API Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Пройдено тестов:** \`$passed / $total\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Баллы:** \`$score / 15\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Тесты Pet API (20 баллов)
  # ─────────────────────────────────────────────────────────────
  test-pet:
    name: "🐾 Pet API (20 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_pet.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/pet_results.json 2>&1 | tee tools/output/pet_output.txt || true
          
          passed=$(python -c "import json; print(json.load(open('tools/output/pet_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/pet_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          
          # 20 баллов за 10 тестов: 2 балла за тест
          score=$(python -c "print(int(min(20, $passed * 2)))")
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/pet_score.txt
          echo "$passed" > tools/output/pet_passed.txt
          echo "$total" > tools/output/pet_total.txt
      - name: Вывод в Summary
        run: |
          passed=${{ steps.test.outputs.passed }}
          total=${{ steps.test.outputs.total }}
          score=${{ steps.test.outputs.score }}
          echo "## 🐾 Pet API Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Пройдено тестов:** \`$passed / $total\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Баллы:** \`$score / 20\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Тесты Store API (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-store:
    name: "🛒 Store API (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_store.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/store_results.json 2>&1 | tee tools/output/store_output.txt || true
          
          passed=$(python -c "import json; print(json.load(open('tools/output/store_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/store_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          
          # 15 баллов за 7 тестов: ~2 балла за тест
          score=$(python -c "print(int(min(15, $passed * 2)))")
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/store_score.txt
          echo "$passed" > tools/output/store_passed.txt
          echo "$total" > tools/output/store_total.txt
      - name: Вывод в Summary
        run: |
          passed=${{ steps.test.outputs.passed }}
          total=${{ steps.test.outputs.total }}
          score=${{ steps.test.outputs.score }}
          echo "## 🛒 Store API Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Пройдено тестов:** \`$passed / $total\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Баллы:** \`$score / 15\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 6: Тесты валидации (15 баллов)
  # ─────────────────────────────────────────────────────────────
  test-validation:
    name: "✅ Validation (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_validation.py -v --tb=short --timeout=60 --json-report --json-report-file=tools/output/validation_results.json 2>&1 | tee tools/output/validation_output.txt || true
          
          passed=$(python -c "import json; print(json.load(open('tools/output/validation_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/validation_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          
          # 15 баллов за 6 тестов: 2.5 балла за тест
          score=$(python -c "print(int(min(15, $passed * 2.5)))")
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/validation_score.txt
          echo "$passed" > tools/output/validation_passed.txt
          echo "$total" > tools/output/validation_total.txt
      - name: Вывод в Summary
        run: |
          passed=${{ steps.test.outputs.passed }}
          total=${{ steps.test.outputs.total }}
          score=${{ steps.test.outputs.score }}
          echo "## ✅ Validation Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Пройдено тестов:** \`$passed / $total\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Баллы:** \`$score / 15\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 7: E2E тесты (25 баллов)
  # ─────────────────────────────────────────────────────────────
  test-e2e:
    name: "🔄 E2E Tests (25 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, test-user, test-pet, test-store]
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Запуск E2E тестов
        id: test
        run: |
          mkdir -p tools/output logs allure-results
          pytest tests/test_e2e.py -v --tb=short --timeout=120 --json-report --json-report-file=tools/output/e2e_results.json 2>&1 | tee tools/output/e2e_output.txt || true
          
          passed=$(python -c "import json; print(json.load(open('tools/output/e2e_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          total=$(python -c "import json; print(json.load(open('tools/output/e2e_results.json')).get('summary',{}).get('total',0))" 2>/dev/null) || total=0
          
          # 25 баллов за 5 тестов: 5 баллов за тест
          score=$(python -c "print(int(min(25, $passed * 5)))")
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/e2e_score.txt
          echo "$passed" > tools/output/e2e_passed.txt
          echo "$total" > tools/output/e2e_total.txt
      - name: Вывод в Summary
        run: |
          passed=${{ steps.test.outputs.passed }}
          total=${{ steps.test.outputs.total }}
          score=${{ steps.test.outputs.score }}
          echo "## 🔄 E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Пройдено тестов:** \`$passed / $total\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Баллы:** \`$score / 25\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 8: Итоговый отчёт
  # ─────────────────────────────────────────────────────────────
  final-summary:
    name: "📊 Итоговый отчёт"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, lint-code, test-user, test-pet, test-store, test-validation, test-e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Генерация
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python tools/generate_final_summary.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "**ИТОГО: Ошибка**" >> $GITHUB_STEP_SUMMARY
      - name: Upload артефактов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: petstore-artifacts-${{ github.run_number }}
          path: |
            tools/output/
            allure-results/
            logs/
          retention-days: 7